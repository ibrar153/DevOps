trigger:
- main

steps:
- task: Docker@2
  displayName: Build and Push to ACR
  inputs:
    command: buildAndPush
    containerRegistry: 'Apka_ACR_Connection'
    repository: 'codealpha-task1'

- task: AzureWebAppContainer@1
  displayName: Deploy to Azure App Service
  inputs:
    azureSubscription: 'Apka_Subscription'
    appName: 'Apka_App_Name'
    imageName: 'apkaacr.azurecr.io/codealpha-task1:$(Build.BuildId)'
